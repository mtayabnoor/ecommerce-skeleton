name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ─── Lint ──────────────────────────────────────────────────────
  lint:
    name: Lint (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [root]
        include:
          - package: root
            working-directory: .
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.working-directory }}
      - name: Run ESLint
        run: npm run lint
        working-directory: ${{ matrix.working-directory }}

  # ─── Type Check ────────────────────────────────────────────────
  typecheck:
    name: Type Check (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [root]
        include:
          - package: root
            working-directory: .
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.working-directory }}
      - name: Type check
        run: npm run type-check
        working-directory: ${{ matrix.working-directory }}

  # ─── Build ─────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install all dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  # ─── Security Audit ────────────────────────────────────────────
  security:
    name: Security Audit (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [root]
        include:
          - package: root
            working-directory: .
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.working-directory }}
      - name: Security audit
        run: npm audit --audit-level=high --omit=dev
        working-directory: ${{ matrix.working-directory }}

  # ─── Summary Gate ──────────────────────────────────────────────
  ci-passed:
    name: CI Passed
    if: always()
    needs: [commitlint, lint, typecheck, build, security]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          echo "Commitlint: ${{ needs.commitlint.result }}"
          echo "Lint:       ${{ needs.lint.result }}"
          echo "Typecheck:  ${{ needs.typecheck.result }}"
          echo "Build:      ${{ needs.build.result }}"
          echo "Security:   ${{ needs.security.result }}"

          # commitlint is skipped on push events, that's fine
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.typecheck.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]] || \
             [[ "${{ needs.security.result }}" == "failure" ]]; then
            echo "::error::One or more CI checks failed"
            exit 1
          fi

          echo "✅ All CI checks passed"