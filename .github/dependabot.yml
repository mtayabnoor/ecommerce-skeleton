version: 2

updates:
  # Root package.json
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
    open-pull-requests-limit: 10
    reviewers:
      - 'mtayabnoor'
    labels:
      - 'dependencies'
      - 'electron'
      - 'automated'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    target-branch: 'main'
    groups:
      non-breaking:
        update-types:
          - 'minor'
          - 'patch'
      major:
        update-types:
          - 'major'

  # GitHub Actions workflows
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
    open-pull-requests-limit: 5
    reviewers:
      - 'mtayabnoor'
    labels:
      - 'dependencies'
      - 'ci/cd'
      - 'automated'
    commit-message:
      prefix: 'ci'
    target-branch: 'main'
    groups:
      actions:
        patterns:
          - '*'
